<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-MOSIBA | سناب تيوب برو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background: #0b0e14; height: 100vh; display: flex; 
            justify-content: center; align-items: center; color: #fff;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px;
            padding: 30px; width: 92%; max-width: 420px; text-align: center;
        }
        h1 { font-size: 2.5rem; color: #f1c40f; margin-bottom: 20px; }
        input {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: #fff; margin-bottom: 15px; box-sizing: border-box;
            outline: none; text-align: center; font-size: 1rem; color: #333;
        }
        .btn-analyze {
            background: #f1c40f; color: #000; border: none; padding: 18px;
            border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer;
        }
        .video-box {
            display: none; margin-top: 20px; background: rgba(255,255,255,0.07);
            padding: 15px; border-radius: 20px; border: 1px solid #f1c40f;
            animation: fadeIn 0.5s ease;
        }
        .video-box img { width: 100%; border-radius: 12px; margin-bottom: 10px; }
        .download-btn {
            background: #27ae60; color: #fff; border: none; padding: 15px;
            border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer;
            text-decoration: none; display: inline-block; margin-top: 10px;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-card">
    <h1>AL-MOSIBA</h1>
    <p style="margin-bottom: 20px; opacity: 0.8;">حلل وحمل MP3 بضغطة واحدة ⬇️</p>
    
    <input type="text" id="targetUrl" placeholder="ضع رابط يوتيوب هنا...">
    <button class="btn-analyze" id="actionBtn" onclick="analyzeIt()">تحليل الرابط ✨</button>

    <div id="resultBox" class="video-box">
        <img id="thumb" src="" alt="">
        <p id="vTitle" style="font-size: 14px; margin: 10px 0;"></p>
        <a id="dlLink" class="download-btn">⬇️ سحب ملف MP3 الآن</a>
    </div>

    <p style="margin-top: 30px; font-size: 11px; opacity: 0.3;">بواسطة قصي الفلسطيني &copy; 2026</p>
</div>

<script>
    function analyzeIt() {
        const url = document.getElementById('targetUrl').value.trim();
        const id = extractId(url);
        
        if(!id) return Swal.fire('تنبيه', 'الرابط مش مضبوط يا غالي', 'warning');

        // إظهار معلومات الفيديو (زي سناب تيوب)
        document.getElementById('thumb').src = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
        document.getElementById('vTitle').innerText = "تم العثور على الفيديو، اضغط للتحميل المباشر";
        
        // رابط التحميل (سيرفر y2mate - سريع جداً ومستقر)
        // بنفتحه بطريقة ما تعمل "رفض اتصال"
        const finalUrl = `https://www.y2mate.com/youtube/${id}`;
        
        document.getElementById('dlLink').onclick = function() {
            window.location.href = `https://sh.m-sh.sh/download.php?url=${encodeURIComponent(url)}&type=mp3`;
            Swal.fire('تم! ✨', 'بدأ سحب الصوت، انتظر ثواني فقط', 'success');
        };

        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('actionBtn').innerText = "تحليل رابط آخر 🔄";
    }

    function extractId(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const m = url.match(reg);
        return (m && m[2].length == 11) ? m[2] : null;
    }
</script>

</body>
</html>
