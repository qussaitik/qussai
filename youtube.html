<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-MOSIBA | يوتيوب برو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background: #0b0e14; height: 100vh; display: flex; 
            justify-content: center; align-items: center; color: #fff;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px;
            padding: 40px; width: 90%; max-width: 420px; text-align: center;
        }
        h1 { font-size: 2.8rem; color: #f1c40f; margin-bottom: 20px; text-transform: uppercase; }
        input {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: #fff; margin-bottom: 20px; box-sizing: border-box;
            outline: none; text-align: center; font-size: 1rem; color: #333;
        }
        .btn-fetch {
            background: #f1c40f; color: #000; border: none; padding: 18px;
            border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="main-card">
    <h1>AL-MOSIBA</h1>
    <p style="margin-bottom: 30px; opacity: 0.8;">تحميل MP3 بأسلوب التيك توك 🎵</p>
    
    <input type="text" id="targetUrl" placeholder="ضع رابط اليوتيوب هنا...">
    <button class="btn-fetch" id="mainBtn" onclick="smartDownload()">بدء التحميل المباشر 🔥</button>

    <p style="margin-top: 40px; font-size: 11px; opacity: 0.3;">بواسطة قصي الفلسطيني &copy; 2026</p>
</div>

<script>
    async function smartDownload() {
        const urlInput = document.getElementById('targetUrl').value.trim();
        const btn = document.getElementById('mainBtn');
        const videoId = extractId(urlInput);
        
        if(!urlInput || !videoId) return Swal.fire('وين الرابط؟', 'حط رابط يوتيوب صح يا وحش', 'warning');

        btn.innerText = "جاري المعالجة... ⏳";
        btn.disabled = true;

        Swal.fire({ title: 'لحظات يا فخم...', text: 'جاري تجهيز الملف الصوتي', didOpen: () => { Swal.showLoading(); } });

        // استخدمنا سيرفر cobalt.tools - هاد السيرفر هو "الوحش" حالياً
        // بيعطينا رابط تحميل مباشر وفوري بدون أي صفحات وسيطة
        const apiBase = "https://api.cobalt.tools/api/json";
        
        try {
            const response = await fetch(apiBase, {
                method: "POST",
                headers: {
                    "Accept": "application/json",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    url: urlInput,
                    downloadMode: "audio",
                    audioFormat: "mp3"
                })
            });

            const data = await response.json();

            if (data.url) {
                // هسا بنستخدم نفس حركة كود التيك توك تبعك (تنزيل صامت غصب)
                const a = document.createElement('a');
                a.href = data.url;
                a.download = `Al-Mosiba-${videoId}.mp3`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                Swal.fire({ title: 'جاهز! ✨', text: 'بدأ التحميل عندك فوق', icon: 'success', timer: 2000, showConfirmButton: false });
            } else {
                throw new Error();
            }
        } catch (e) {
            // حل بديل سريع جداً إذا فشل السيرفر الأول
            window.location.href = `https://convert2mp3s.com/api/button/mp3/${videoId}`;
        } finally {
            btn.innerText = "بدء التحميل المباشر 🔥";
            btn.disabled = false;
        }
    }

    function extractId(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const m = url.match(reg);
        return (m && m[2].length == 11) ? m[2] : null;
    }
</script>

</body>
</html>
