<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-MOSIBA | الحل النهائي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background: #0b0e14; height: 100vh; display: flex; 
            justify-content: center; align-items: center; color: #fff;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px;
            padding: 40px; width: 90%; max-width: 420px; text-align: center;
        }
        h1 { font-size: 2.8rem; color: #f1c40f; margin-bottom: 20px; }
        input {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: #fff; margin-bottom: 20px; box-sizing: border-box;
            outline: none; text-align: center; font-size: 1rem; color: #333;
        }
        .btn-fetch {
            background: #f1c40f; color: #000; border: none; padding: 18px;
            border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="main-card">
    <h1>AL-MOSIBA</h1>
    <p style="margin-bottom: 30px; opacity: 0.8;">تحميل MP3 بدون صفحات بيضاء غصب 🎵</p>
    
    <input type="text" id="targetUrl" placeholder="حط رابط يوتيوب هون...">
    <button class="btn-fetch" id="mainBtn" onclick="smartFetch()">ابدأ السحب الآن 🔥</button>

    <p style="margin-top: 40px; font-size: 11px; opacity: 0.3;">بواسطة قصي الفلسطيني &copy; 2026</p>
</div>

<script>
    async function smartFetch() {
        const url = document.getElementById('targetUrl').value.trim();
        const btn = document.getElementById('mainBtn');
        
        if(!url.includes('youtu')) return Swal.fire('تنبيه', 'الرابط غلط يا وحش', 'warning');

        btn.innerText = "جاري التحويل... ⏳";
        btn.disabled = true;

        // استخدمنا سيرفر (meown) - هذا السيرفر بيعطي JSON زي التيك توك تماماً
        // وبيرجع رابط تحميل مباشر (Direct Link)
        const apiUrl = `https://api.vvevioz.com/@api/button/mp3/${extractId(url)}`; // جربنا نغير البروتوكول

        try {
            // الطريقة الأضمن: رح نخليه يحمل الملف كأنه "بنزله" من سيرفرك
            const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`);
            
            // إذا السيرفر لسا شغال، رح يبلش يحمل
            window.location.href = apiUrl; 

            Swal.fire({
                title: 'تم! ✨',
                text: 'بدأ التحميل، إذا ما اشتغل اضغط مرة ثانية',
                icon: 'success',
                timer: 2000
            });
        } catch (e) {
            // إذا كل شي سكر بوجهنا، بنستخدم "الخطة ب" (سيرفر ياباني سريع)
            window.location.href = `https://convert2mp3s.com/api/button/mp3/${extractId(url)}`;
        } finally {
            setTimeout(() => {
                btn.innerText = "ابدأ السحب الآن 🔥";
                btn.disabled = false;
            }, 5000);
        }
    }

    function extractId(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const m = url.match(reg);
        return (m && m[2].length == 11) ? m[2] : null;
    }
</script>

</body>
</html>
