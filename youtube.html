<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-MOSIBA | تحميل صوت من يوتيوب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(-45deg, #1e1b40, #ff416c, #23a6d5, #0f0c29);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 35px;
            padding: 40px 25px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h1 { font-size: 2.8rem; margin: 0; font-weight: 900; text-shadow: 0 5px 15px rgba(0,0,0,0.3); color: #fff; }
        .description { font-size: 1rem; margin-bottom: 30px; font-weight: 600; color: #a29bfe; }

        input {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            font-size: 1rem;
            color: #333;
            font-weight: bold;
            transition: 0.3s;
        }
        
        input:focus { border-color: #ff416c; box-shadow: 0 0 15px rgba(255, 65, 108, 0.4); }

        .btn-fetch {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: #fff;
            border: none;
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3);
        }

        .btn-fetch:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 65, 108, 0.5); }
        .btn-fetch:disabled { background: #666; cursor: not-allowed; transform: none; }

        .footer-text { margin-top: 25px; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>المصيبة</h1>
    <p class="description">أسرع محول يوتيوب إلى MP3 🎵</p>
    
    <input type="text" id="youtubeUrl" placeholder="انسخ رابط الفيديو هون...">
    <button class="btn-fetch" id="convertBtn" onclick="convertYoutube()">تحميل الأغنية فوراً 🔥</button>

    <p class="footer-text">قوة قصي الفلسطيني 🇵🇸 2026</p>
</div>

<script>
    function convertYoutube() {
        const urlInput = document.getElementById('youtubeUrl').value.trim();
        const btn = document.getElementById('convertBtn');
        
        if (!urlInput) {
            return Swal.fire('وين الرابط؟', 'حط الرابط أول يا وحش 😉', 'info');
        }

        if (!urlInput.includes('youtube.com') && !urlInput.includes('youtu.be')) {
            return Swal.fire('رابط غلط', 'تأكد إنه رابط يوتيوب حقيقي', 'warning');
        }

        btn.innerText = "جاري التحضير... 🚀";
        btn.disabled = true;

        // استخراج الـ ID أو استخدام الرابط المباشر لخدمة مضمونة
        // نستخدم خدمة klickaud أو y2mate-style api المستقرة
        try {
            // الطريقة المباشرة والأكثر ضماناً هي توجيه المستخدم لخدمة معالجة فورية
            // هذا الرابط يستخدم محرك mp3-now المستقر جداً
            const downloadServiceUrl = `https://www.y2mate.com/youtube-mp3/${extractVideoId(urlInput)}`;
            
            // فتح التحميل في نافذة جديدة لضمان عدم تعليق موقعك
            window.open(downloadServiceUrl, '_blank');

            Swal.fire({
                title: 'جاهز! ✅',
                text: 'فتحت لك صفحة التحميل، اضغط Download ومبروك عليك',
                icon: 'success',
                confirmButtonText: 'تمام'
            });

        } catch (e) {
            Swal.fire('مشكلة', 'الرابط فيه مشكلة، جرب غيره', 'error');
        } finally {
            btn.innerText = "تحميل الأغنية فوراً 🔥";
            btn.disabled = false;
        }
    }

    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length == 11) ? match[2] : url;
    }
</script>

</body>
</html>
