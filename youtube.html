<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصيبة | تحميل مباشر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --accent: #6c5ce7; --bg: #0b0e14; }
        body {
            margin: 0; font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle, #1a1e2e 0%, #0b0e14 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
            padding: 50px 30px; width: 90%; max-width: 450px; text-align: center;
        }
        h1 { font-size: 3rem; font-weight: 900; margin-bottom: 10px; background: linear-gradient(to bottom, #fff, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input {
            width: 100%; padding: 22px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: #fff; font-size: 1rem; text-align: center; outline: none; margin-bottom: 25px;
        }
        .btn-fetch {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: #fff; border: none;
            padding: 22px; border-radius: 20px; width: 100%; font-weight: 700; font-size: 1.3rem; cursor: pointer; transition: 0.3s;
        }
        .btn-fetch:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="main-card">
    <h1>المصيبة</h1>
    <p style="opacity: 0.7; margin-bottom: 35px;">تحميل الملفات الصوتية فوراً 🎵</p>
    
    <input type="text" id="youtubeUrl" placeholder="تفضل بإضافة الرابط هنا">
    <button class="btn-fetch" id="convertBtn" onclick="forceDownload()">بدء التحميل الآن</button>

    <p style="margin-top: 40px; font-size: 12px; opacity: 0.4;">بواسطة قصي الفلسطيني &copy; 2026</p>
</div>

<script>
    async function forceDownload() {
        const urlInput = document.getElementById('youtubeUrl').value.trim();
        const btn = document.getElementById('convertBtn');
        
        if (!urlInput) return Swal.fire('عذراً', 'يرجى وضع الرابط أولاً', 'info');

        const videoId = extractVideoId(urlInput);
        if(!videoId) return Swal.fire('خطأ', 'الرابط غير صحيح', 'warning');

        btn.innerText = "جاري التحميل... ⏳";
        btn.disabled = true;

        // رابط السيرفر المباشر (Direct Download Link)
        // هذا الرابط مصمم ليعطي ملف MP3 فوراً للمتصفح دون فتح صفحات
        const directLink = `https://api.vevioz.com/@api/button/mp3/${videoId}`;

        try {
            // ننشئ عنصر "link" مخفي ونحاكِي ضغطة المستخدم لبدء التحميل
            const link = document.createElement('a');
            link.href = directLink;
            link.setAttribute('download', ''); // لإجبار المتصفح على التحميل
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            Swal.fire({
                title: 'تم بنجاح! ✨',
                text: 'بدأ تحميل الملف على هاتفك الآن',
                icon: 'success',
                timer: 3000,
                showConfirmButton: false
            });
        } catch (e) {
            Swal.fire('نعتذر', 'السيرفر مشغول حالياً، يرجى المحاولة مرة أخرى', 'error');
        } finally {
            setTimeout(() => {
                btn.innerText = "بدء التحميل الآن";
                btn.disabled = false;
            }, 4000);
        }
    }

    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length == 11) ? match[2] : null;
    }
</script>

</body>
</html>
