<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-MOSIBA | الحل الجذري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background: #0b0e14; height: 100vh; display: flex; 
            justify-content: center; align-items: center; color: #fff;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px;
            padding: 40px; width: 90%; max-width: 420px; text-align: center;
        }
        h1 { font-size: 2.8rem; color: #f1c40f; margin-bottom: 20px; text-transform: uppercase; }
        input {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: #fff; margin-bottom: 20px; box-sizing: border-box;
            outline: none; text-align: center; font-size: 1rem; color: #333;
        }
        .btn-fetch {
            background: #f1c40f; color: #000; border: none; padding: 18px;
            border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn-fetch:disabled { background: #444; color: #888; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>AL-MOSIBA</h1>
    <p style="margin-bottom: 30px; opacity: 0.8;">تحميل MP3 داخلي 100% غصب 🎵</p>
    
    <input type="text" id="targetUrl" placeholder="ضع رابط اليوتيوب هنا...">
    <button class="btn-fetch" id="mainBtn" onclick="startAlMosiba()">ابدأ التحميل الآن 🔥</button>

    <p style="margin-top: 40px; font-size: 11px; opacity: 0.3;">بواسطة قصي الفلسطيني &copy; 2026</p>
</div>

<script>
    async function startAlMosiba() {
        const urlInput = document.getElementById('targetUrl').value.trim();
        const btn = document.getElementById('mainBtn');
        const videoId = extractId(urlInput);
        
        if(!urlInput || !videoId) return Swal.fire('وين الرابط؟', 'حط رابط يوتيوب صح يا وحش', 'warning');

        btn.innerText = "جاري السحب الصامت... ⚡";
        btn.disabled = true;

        // الخطة: استخدام سيرفر "loader" كـ API خلفي بدون ما تظهر صفحته
        // هاد السيرفر مستقر جداً وما بيطلع الصفحة البيضاء اللي شفتها
        const apiUrl = `https://loader.to/api/button/?url=${encodeURIComponent(urlInput)}&f=mp3`;

        try {
            // محاكاة "إتيكيت" التحميل بنفس طريقة كود التيك توك تبعك
            // نفتح الرابط في فريم مخفي عشان يبلش تحميل فوراً بدون ما يغير الصفحة
            let frame = document.getElementById('hiddenFrame');
            if(!frame) {
                frame = document.createElement('iframe');
                frame.id = 'hiddenFrame';
                frame.style.display = 'none';
                document.body.appendChild(frame);
            }
            frame.src = apiUrl;

            Swal.fire({
                title: 'تمت العملية! ✨',
                text: 'ثواني وببلش الملف ينزل عندك فوق',
                icon: 'success',
                timer: 3000,
                showConfirmButton: false
            });
        } catch (e) {
            Swal.fire('عذراً', 'يوتيوب عامل حماية، جرب مرة ثانية', 'error');
        } finally {
            setTimeout(() => {
                btn.innerText = "ابدأ التحميل الآن 🔥";
                btn.disabled = false;
            }, 5000);
        }
    }

    function extractId(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const m = url.match(reg);
        return (m && m[2].length == 11) ? m[2] : null;
    }
</script>

</body>
</html>
