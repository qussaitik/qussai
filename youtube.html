<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-MOSIBA | يوتيوب برو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background: linear-gradient(-45deg, #2c3e50, #000000, #2c3e50);
            background-size: 400% 400%; animation: gradient 15s ease infinite;
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: #fff;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .main-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
            padding: 50px 30px; width: 90%; max-width: 450px; text-align: center;
        }
        h1 { font-size: 3rem; font-weight: 900; margin: 0; background: linear-gradient(to bottom, #fff, #f1c40f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .description { font-size: 1.1rem; margin-bottom: 30px; opacity: 0.8; }
        input {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: rgba(255, 255, 255, 0.95); margin-bottom: 20px;
            box-sizing: border-box; outline: none; text-align: center; font-size: 1.1rem; color: #333;
        }
        .btn-fetch {
            background: #f1c40f; color: #000; border: none; padding: 20px;
            border-radius: 20px; width: 100%; font-weight: 900; font-size: 1.3rem; cursor: pointer; transition: 0.3s;
        }
        .btn-fetch:disabled { background: #555; color: #ccc; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>AL-MOSIBA</h1>
    <p class="description">تحميل صوت يوتيوب MP3 بكل رقي 🎵</p>
    
    <input type="text" id="targetUrl" placeholder="تفضل بوضع رابط يوتيوب هنا...">
    <button class="btn-fetch" id="mainBtn" onclick="fetchYouTube()">بدء المعالجة الذكية ✨</button>

    <p style="margin-top: 40px; font-size: 12px; opacity: 0.4;">بواسطة قصي الفلسطيني &copy; 2026</p>
</div>

<script>
    async function fetchYouTube() {
        const url = document.getElementById('targetUrl').value.trim();
        const btn = document.getElementById('mainBtn');
        
        if(!url.includes('youtu')) return Swal.fire('تنبيه', 'حط رابط يوتيوب صح يا غالي 😉', 'warning');

        btn.innerText = "جاري السحب غصب... ⚡";
        btn.disabled = true;

        Swal.fire({
            title: 'جاري المعالجة...',
            text: 'يتم الآن سحب الملف الصوتي داخل موقعك',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        // استخراج الـ ID
        const videoId = extractId(url);
        // استخدام سيرفر API مباشر يعطي رابط ملف خام (Raw File)
        const apiLink = `https://api.vevioz.com/@api/button/mp3/${videoId}`;

        try {
            // نفس حركة كود التيك توك تبعك (Fetch -> Blob -> Download)
            const response = await fetch(apiLink);
            
            // بما إن الـ API أحياناً بيعمل Redirect، بنعمل محاكاة تحميل "إتيكيت"
            const a = document.createElement('a');
            a.href = apiLink;
            a.download = `Al-Mosiba-${videoId}.mp3`;
            a.target = "_self"; // تأكيد إنه ما يفتح نافذة
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            Swal.fire({ title: 'جاهز! ✨', text: 'بدأ التحميل فوراً على جهازك', icon: 'success', timer: 2000, showConfirmButton: false });
        } catch (e) {
            // في حال فشل الـ Fetch المباشر بسبب الـ CORS
            // بنستخدم "فتحة" المتصفح العادية بس بدون ما يحس المستخدم
            window.location.href = apiLink; 
        } finally {
            btn.innerText = "بدء المعالجة الذكية ✨";
            btn.disabled = false;
        }
    }

    function extractId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length == 11) ? match[2] : null;
    }
</script>

</body>
</html>
