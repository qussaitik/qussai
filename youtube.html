<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-MOSIBA | سناب تيوب برو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background: #0b0e14; height: 100vh; display: flex; 
            justify-content: center; align-items: center; color: #fff;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px;
            padding: 30px; width: 92%; max-width: 450px; text-align: center;
        }
        h1 { font-size: 2.5rem; color: #f1c40f; margin-bottom: 20px; text-shadow: 0 5px 15px rgba(241, 196, 15, 0.2); }
        input {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: #fff; margin-bottom: 15px; box-sizing: border-box;
            outline: none; text-align: center; font-size: 1rem; color: #333;
        }
        .btn-analyze {
            background: #f1c40f; color: #000; border: none; padding: 18px;
            border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        /* نافذة العرض والتحميل (زي سناب تيوب) */
        #downloadArea {
            display: none; margin-top: 25px; border-radius: 20px;
            overflow: hidden; border: 1px solid #f1c40f;
            background: #000; animation: slideUp 0.5s ease;
        }
        iframe { width: 100%; height: 200px; border: none; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main-card">
    <h1>AL-MOSIBA</h1>
    <p style="margin-bottom: 20px; opacity: 0.8;">حلل الرابط وحمل MP3 فوراً ⬇️</p>
    
    <input type="text" id="targetUrl" placeholder="ضع رابط يوتيوب هنا...">
    <button class="btn-analyze" id="actionBtn" onclick="openSnaptubeStyle()">تحليل وإظهار التحميل ✨</button>

    <div id="downloadArea">
        <iframe id="dlFrame" src=""></iframe>
    </div>

    <p style="margin-top: 30px; font-size: 11px; opacity: 0.3;">بواسطة قصي الفلسطيني &copy; 2026</p>
</div>

<script>
    function openSnaptubeStyle() {
        const url = document.getElementById('targetUrl').value.trim();
        const btn = document.getElementById('actionBtn');
        const area = document.getElementById('downloadArea');
        const frame = document.getElementById('dlFrame');

        if(!url.includes('youtu')) {
            return Swal.fire('تنبيه', 'الرابط مش يوتيوب يا غالي 😉', 'warning');
        }

        btn.innerText = "جاري فتح نافذة التحميل... ⏳";
        
        // استخدام محرك معالجة خارجي مستقر جداً (Loader.to) داخل Iframe
        // هذا المحرك بيعرض زر MP3 مباشرة جوا موقعنا
        const loaderUrl = `https://loader.to/api/card/?url=${encodeURIComponent(url)}&f=mp3&color=f1c40f`;
        
        frame.src = loaderUrl;
        area.style.display = 'block';

        Swal.fire({
            title: 'تم التحليل! ✨',
            text: 'اختر جودة الـ MP3 من النافذة بالأسفل وابدأ التحميل',
            icon: 'success',
            timer: 3000,
            showConfirmButton: false
        });

        btn.innerText = "تحليل رابط آخر 🔄";
    }
</script>

</body>
</html>
