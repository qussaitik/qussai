<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المصيبه للتحميل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #0f0c29;
            --white: #ffffff;
            --gold: #f1c40f;
        }

        /* --- شاشة الترحيب الفخمة --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1e1b40 0%, #0f0c29 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000000;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0; padding: 0;
        }
        .splash-content { 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .splash-logo {
            width: 85%; /* تكبير اللوجو */
            max-width: 350px;
            height: auto;
            animation: pulseGlow 2s infinite ease-in-out;
            filter: drop-shadow(0 0 20px rgba(108, 92, 231, 0.6));
        }
        .splash-loader-bar {
            width: 70%; /* تكبير شريط التحميل */
            max-width: 250px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-top: 40px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .splash-progress {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #00d2ff, #9b59b6, #00d2ff);
            background-size: 200% 100%;
            animation: splashLoad 3s forwards linear, gradientMove 2s infinite linear;
        }
        .splash-loading-text {
            font-family: 'Tajawal', sans-serif;
            color: #fff; font-size: 16px; font-weight: 700; margin-top: 20px;
            letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(108, 92, 231, 0.6)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(108, 92, 231, 0.9)); }
        }
        @keyframes splashLoad { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes gradientMove { 0% { background-position: 100% 0%; } 100% { background-position: -100% 0%; } }

        /* --- الصفحة الرئيسية --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f0c29;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        #portal-view {
            width: 100%;
            max-width: 500px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-logo {
            text-align: center; margin-bottom: 40px;
        }
        
        .brand-img {
            width: 140px; /* تكبير اللوجو الرئيسي */
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .main-logo h1 {
            font-size: 48px; /* تكبير العنوان */
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .portal-container {
            display: flex; flex-direction: column; gap: 18px;
            width: 100%;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 22px; border-radius: 28px;
            display: flex; align-items: center; gap: 20px;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(15px);
            text-decoration: none;
            color: white;
        }

        .portal-card:hover {
            background: rgba(108, 92, 231, 0.25);
            transform: scale(1.03);
            border-color: var(--primary);
        }

        .icon-box {
            width: 65px; height: 65px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .tiktok-bg { background: linear-gradient(45deg, #6c5ce7, #a29bfe); }
        .youtube-bg { background: linear-gradient(45deg, #ff4b2b, #ff416c); }
        .soon-bg { background: linear-gradient(45deg, #444, #222); }

        .card-text h3 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
        .card-text p { font-size: 13px; opacity: 0.8; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .portal-container { animation: slideUp 1s ease-out; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <img src="shaqi.png" alt="AL-MOSIBA" class="splash-logo">
            <div class="splash-loader-bar">
                <div class="splash-progress"></div>
            </div>
            <p class="splash-loading-text">تحميل عالم المصيبة...</p>
        </div>
    </div>

    <div id="portal-view">
        <div class="main-logo">
            <img src="shaqi.png" alt="Logo" class="brand-img">
            <h1>المصيبه</h1>
            <p style="opacity: 0.8; font-size: 14px; letter-spacing: 3px; color: var(--gold); font-weight: bold;">🇵🇸 QUSSAI PALESTINE 🇵🇸</p>
        </div>

        <div class="portal-container">
            <a href="tiktok.html" class="portal-card">
                <div class="icon-box tiktok-bg"><i class="fab fa-tiktok"></i></div>
                <div class="card-text">
                    <h3>تيك توك</h3>
                    <p>تحميل فيديوهات بدون علامة مائية</p>
                </div>
            </a>

            <a href="youtube.html" class="portal-card">
                <div class="icon-box youtube-bg"><i class="fab fa-youtube"></i></div>
                <div class="card-text">
                    <h3>يوتيوب MP3</h3>
                    <p>تحويل سريع بجودة عالية جداً</p>
                </div>
            </a>

            <div class="portal-card" style="cursor: default; opacity: 0.5;">
                <div class="icon-box soon-bg"><i class="fas fa-lock"></i></div>
                <div class="card-text">
                    <h3>قريباً</h3>
                    <p>خدمات حصرية قيد التطوير</p>
                </div>
            </div>
        </div>
        
        <p style="text-align: center; margin-top: 40px; font-size: 12px; opacity: 0.5; font-weight: 500;">
            بواسطة قصي الفلسطيني &copy; 2026
        </p>
    </div>

    <script>
        const splash = document.getElementById('splash-screen');
        
        // منع الإخفاء الفوري.. انتظر انتهاء انيميشن الشريط (3 ثواني)
        window.addEventListener('load', () => {
            setTimeout(() => {
                if(splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.remove(), 800);
                }
            }, 3200); // 3200ms عشان نضمن شريط التحميل وصل للآخر
        });
    </script>
</body>
</html>
