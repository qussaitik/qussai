<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>المصيبه | البوابة الملكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --bg: #0b0e14; --card-bg: #161b22; --primary: #6c5ce7; --gold: #f1c40f; --text: #e6edf3; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: radial-gradient(circle at center, #1a1c24 0%, #0b0e14 100%); height: 100vh; color: var(--text); overflow: hidden; display: flex; flex-direction: column; }

        /* --- اللودر (Splash) --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000000; transition: opacity 0.8s ease; text-align: center;
        }
        .splash-logo { width: 85%; max-width: 400px; margin-bottom: 20px; animation: pulseGlow 2.5s infinite ease-in-out; }
        .splash-loader-bar { width: 70%; max-width: 250px; height: 5px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; }
        .splash-progress { width: 0%; height: 100%; background: linear-gradient(90deg, var(--gold), var(--primary)); animation: splashLoad 3s forwards linear; }
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(108, 92, 231, 0.2)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(108, 92, 231, 0.4)); } }
        @keyframes splashLoad { 0% { width: 0%; } 100% { width: 100%; } }

        /* --- القائمة الرئيسية (تصميم فخم جديد) --- */
        #main-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; display: none; flex-direction: column; justify-content: center; align-items: center;
            gap: 25px; z-index: 99999; padding: 20px;
        }
        .menu-logo {
            width: 180px; margin-bottom: 30px; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .menu-btn {
            width: 100%; max-width: 320px; padding: 20px; border-radius: 20px;
            background: var(--glass); 
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            color: white; font-weight: 700; font-size: 1.15rem; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .menu-btn i { font-size: 1.4rem; transition: 0.3s; }
        .btn-chat { border-right: 4px solid var(--primary); }
        .btn-tiktok { border-right: 4px solid #ff0050; }

        .menu-btn:hover, .menu-btn:active {
            background: rgba(108, 92, 231, 0.15);
            transform: translateY(-5px) scale(1.02);
            border-color: var(--primary);
        }
        .menu-btn:active { transform: scale(0.98); }

        .menu-btn span { flex: 1; text-align: right; margin-right: 15px; }

        /* --- واجهة الشات --- */
        #chat-interface { display: none; flex-direction: column; height: 100vh; }
        header { padding: 15px 20px; background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        header h1 { font-size: 1.2rem; font-weight: 900; color: var(--gold); }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; padding-bottom: 100px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; animation: fadeIn 0.3s ease; position: relative; display: flex; flex-direction: column; }
        .msg-me { align-self: flex-start; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .msg-other { align-self: flex-end; background: var(--card-bg); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .msg-admin { border: 1px solid var(--gold); box-shadow: 0 0 15px rgba(241, 196, 15, 0.15); animation: adminPulse 2s infinite alternate; }
        @keyframes adminPulse { from { border-color: var(--gold); } to { border-color: #fff; } }

        .msg-info { font-size: 11px; opacity: 0.7; margin-bottom: 6px; font-weight: bold; }
        .admin-name { color: var(--gold); font-weight: 900; display: inline-flex; align-items: center; gap: 5px; animation: adminMove 3s infinite ease-in-out; position: relative; overflow: hidden; width: fit-content; }
        .admin-name::before { content: '👑'; font-size: 14px; }
        .admin-name::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(120deg, transparent, rgba(255,255,255,0.8), transparent); animation: shineEffect 3s infinite linear; }
        @keyframes shineEffect { 0% { left: -100%; } 30% { left: 100%; } 100% { left: 100%; } }
        @keyframes adminMove { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(3px); } }

        .input-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px 30px; background: linear-gradient(to top, var(--bg) 90%, transparent); display: flex; gap: 10px; z-index: 100; }
        #userMsg { flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); background: var(--card-bg); color: #fff; outline: none; font-family: 'Tajawal'; font-size: 1rem; }
        .send-btn { width: 52px; height: 52px; border-radius: 50%; background: var(--primary); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="shaqi.png" alt="AL-MOSIBA" class="splash-logo">
        <div class="splash-loader-bar"><div class="splash-progress"></div></div>
        <p style="color:#fff; margin-top:18px; font-size: 13px; opacity: 0.6;">جاري دخول عالم المصيبة...</p>
    </div>

    <div id="main-menu">
        <img src="shaqi.png" class="menu-logo" alt="Logo">
        
        <button class="menu-btn btn-chat" onclick="openChat()">
            <i class="fas fa-comments" style="color: var(--primary);"></i>
            <span>دخول المصيبة شات</span>
            <i class="fas fa-chevron-left" style="font-size: 0.8rem; opacity: 0.5;"></i>
        </button>

        <button class="menu-btn btn-tiktok" onclick="window.location.href='tiktok.html'">
            <i class="fab fa-tiktok"></i>
            <span>تحميل فيديو تيك توك</span>
            <i class="fas fa-chevron-left" style="font-size: 0.8rem; opacity: 0.5;"></i>
        </button>
        
        <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.4; letter-spacing: 1px;">AL-MOSIBA V3.0 PRO</p>
    </div>

    <div id="chat-interface">
        <header>
            <button onclick="backToMenu()" style="background:none; border:none; color:#fff; font-size:1.2rem; padding: 5px;"><i class="fas fa-arrow-right"></i></button>
            <h1>المصيبه شات</h1>
            <div id="admin-actions" style="display: none;">
                <button onclick="clearChat()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 12px; border-radius:10px; font-size:11px; font-weight:bold;">مسح 🗑️</button>
            </div>
        </header>
        <div id="chat-box"></div>
        <div class="input-container">
            <input type="text" id="userMsg" placeholder="اكتب رسالتك الراقية..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let myName = "";
        let isAdmin = false;
        const myId = "u_" + Math.random().toString(16).slice(2);
        const pubnub = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', uuid: myId });

        async function openChat() {
            if(!myName) {
                const { value: name } = await Swal.fire({
                    title: 'مرحباً بك',
                    input: 'text',
                    inputPlaceholder: 'اكتب اسمك هنا...',
                    confirmButtonText: 'دخول',
                    background: '#161b22', color: '#fff', confirmButtonColor: '#6c5ce7'
                });
                if(name === "قصي") {
                    const { value: pass } = await Swal.fire({
                        title: 'المدير', input: 'password', inputPlaceholder: 'كلمة السر', confirmButtonText: 'تأكيد', background: '#161b22', color: '#fff', confirmButtonColor: '#f1c40f'
                    });
                    if(pass === "159159") { isAdmin = true; myName = "قصي"; document.getElementById('admin-actions').style.display = 'block'; }
                    else { Swal.fire('خطأ', 'كلمة السر غلط', 'error'); return; }
                } else { myName = name || "مشارك"; }
            }
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'flex';
            pubnub.subscribe({ channels: ['mosiba_v2_final'] });
        }

        function backToMenu() {
            document.getElementById('chat-interface').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }

        pubnub.addListener({
            message: function(s) {
                if(s.message.type === "clear") { document.getElementById('chat-box').innerHTML = '<p style="text-align:center; opacity:0.4; font-size:11px;">تم تنظيف الشات ✨</p>'; }
                else if (s.message.type === "kick" && s.message.targetId === myId) { document.body.innerHTML = "<div style='height:100vh; display:flex; align-items:center; justify-content:center; background:#0b0e14; color:white; text-align:center;'><h1>تم طردك من الشات 🚫</h1></div>"; }
                else if (s.message.text) { renderMessage(s.message.text, s.message.user, s.publisher); }
            }
        });

        function sendMessage() {
            const input = document.getElementById('userMsg');
            if(!input.value.trim()) return;
            pubnub.publish({ channel: 'mosiba_v2_final', message: { text: input.value, user: myName } });
            input.value = '';
        }

        function renderMessage(text, user, senderId) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            const isMe = (senderId === myId);
            const isMsgAdmin = (user === "قصي");
            div.className = `message ${isMe ? 'msg-me' : 'msg-other'} ${isMsgAdmin ? 'msg-admin' : ''}`;
            let nameContent = isMsgAdmin ? `<span class="msg-info admin-name">قصي</span>` : `<span class="msg-info">${user}</span>`;
            div.innerHTML = `${nameContent}<span>${text}</span>`;
            if(isAdmin && !isMe) div.innerHTML += `<div class="admin-tools" onclick="kickUser('${senderId}')">طرد 🚫</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function clearChat() { if(isAdmin) pubnub.publish({ channel: 'mosiba_v2_final', message: { type: "clear" } }); }
        function kickUser(id) { if(isAdmin) pubnub.publish({ channel: 'mosiba_v2_final', message: { type: "kick", targetId: id } }); }

        window.onload = () => {
            setTimeout(() => {
                const s = document.getElementById('splash-screen');
                if(s) {
                    s.style.opacity = '0';
                    setTimeout(() => { 
                        s.remove(); 
                        document.getElementById('main-menu').style.display = 'flex';
                    }, 800);
                }
            }, 3000);
        };
        document.getElementById('userMsg').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
