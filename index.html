<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المصيبه للتحميل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #0f0c29;
            --white: #ffffff;
            --gold: #f1c40f;
        }

        /* --- شاشة الترحيب --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #1e1b40, #16162a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000000;
            transition: opacity 0.6s ease;
            margin: 0; padding: 0;
        }
        .splash-content { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .splash-logo {
            width: 70%;
            max-width: 250px;
            height: auto;
            animation: fadeInGlow 1.2s ease-out forwards;
            filter: drop-shadow(0 0 15px rgba(108, 92, 231, 0.4));
        }
        .splash-loader-bar {
            width: 160px; height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-top: 25px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .splash-progress {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #3498db, #9b59b6);
            animation: splashLoad 3s ease-in-out forwards;
        }
        .splash-loading-text {
            font-family: 'Tajawal', sans-serif;
            color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 15px;
        }

        @keyframes fadeInGlow {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes splashLoad {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            color: white;
        }

        .main-logo {
            text-align: center; margin-bottom: 35px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        .brand-img {
            width: 100px;
            height: auto;
            margin-bottom: 10px;
        }

        .main-logo h1 {
            font-size: 38px; font-weight: 900;
            background: linear-gradient(to bottom, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
        }

        .portal-container {
            display: flex; flex-direction: column; gap: 12px;
            width: 100%; max-width: 380px;
            animation: slideUp 0.8s ease-out;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px; border-radius: 22px;
            display: flex; align-items: center; gap: 15px;
            cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(10px);
            text-decoration: none;
            color: white;
        }

        .portal-card:hover {
            background: rgba(108, 92, 231, 0.15);
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        .icon-box {
            width: 50px; height: 50px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: white;
        }

        .tiktok-bg { background: linear-gradient(45deg, #6c5ce7, #a29bfe); }
        .youtube-bg { background: linear-gradient(45deg, #ff4b2b, #ff416c); }
        .soon-bg { background: linear-gradient(45deg, #f1c40f, #f39c12); }

        .card-text h3 { font-size: 16px; font-weight: 800; margin-bottom: 2px; }
        .card-text p { font-size: 11px; opacity: 0.6; }

        @keyframes glow { from { filter: drop-shadow(0 0 5px rgba(108,92,231,0.3)); } to { filter: drop-shadow(0 0 15px rgba(108,92,231,0.6)); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <img src="shaqi.png" alt="AL-MOSIBA" class="splash-logo">
            <div class="splash-loader-bar">
                <div class="splash-progress"></div>
            </div>
            <p class="splash-loading-text">جاري تحضير عالم المصيبة...</p>
        </div>
    </div>

    <div id="portal-view">
        <div class="main-logo">
            <img src="shaqi.png" alt="Logo" class="brand-img">
            <h1>المصيبه للتحميل</h1>
            <p style="opacity: 0.5; font-size: 12px; letter-spacing: 2px;">🇵🇸 QUSSAI PALESTINE 🇵🇸</p>
        </div>

        <div class="portal-container">
            <a href="tiktok.html" class="portal-card">
                <div class="icon-box tiktok-bg"><i class="fab fa-tiktok"></i></div>
                <div class="card-text">
                    <h3>تنزيل فيديو من تيك توك</h3>
                    <p>تحميل الفيديوهات بدون علامة مائية</p>
                </div>
            </a>

            <a href="youtube.html" class="portal-card">
                <div class="icon-box youtube-bg"><i class="fab fa-youtube"></i></div>
                <div class="card-text">
                    <h3>تنزيل أغنية من يوتيوب</h3>
                    <p>تحويل مقاطع اليوتيوب إلى MP3</p>
                </div>
            </a>

            <div class="portal-card" style="cursor: default; opacity: 0.6;">
                <div class="icon-box soon-bg"><i class="fas fa-clock"></i></div>
                <div class="card-text">
                    <h3>قريباً</h3>
                    <p>إضافات جديدة قادمة</p>
                </div>
            </div>
        </div>
        
        <p style="text-align: center; margin-top: 25px; font-size: 10px; opacity: 0.3;">جميع الحقوق محفوظة لصالح قصي الفلسطيني 2026</p>
    </div>

    <script>
        // دالة الإخفاء التلقائي
        const splash = document.getElementById('splash-screen');
        
        function hideSplash() {
            if(splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 600);
            }
        }

        // غصب عنه يفتح بعد 3.5 ثانية حتى لو الصورة ما طلعت
        setTimeout(hideSplash, 3500);

        // إذا كل شي جاهز قبل الوقت، افتح فوراً
        window.addEventListener('load', hideSplash);
    </script>
</body>
</html>
