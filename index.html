<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>المصيبه | شات التفاعل الحي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --text: #e6edf3;
            --gold: #f1c40f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Tajawal', sans-serif; background: var(--bg);
            height: 100vh; display: flex; flex-direction: column;
            color: var(--text); overflow: hidden;
        }

        /* --- الهيدر (ثابت فوق) --- */
        header {
            padding: 15px 20px; background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between; z-index: 100;
        }
        header h1 { font-size: 1.2rem; font-weight: 900; color: var(--gold); letter-spacing: 1px; }
        .status-dot { width: 8px; height: 8px; background: #238636; border-radius: 50%; box-shadow: 0 0 10px #238636; }

        /* --- منطقة الرسائل (قابلة للتمرير) --- */
        #chat-box {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            scroll-behavior: smooth; padding-bottom: 100px; /* مساحة للبوكس الثابت */
        }

        .message {
            max-width: 85%; padding: 12px 16px; border-radius: 20px;
            font-size: 0.95rem; line-height: 1.4; position: relative;
            animation: fadeIn 0.3s ease;
        }

        /* رسائلي */
        .msg-me {
            align-self: flex-start; background: var(--primary);
            color: #fff; border-bottom-right-radius: 4px;
        }

        /* رسائل الآخرين */
        .msg-other {
            align-self: flex-end; background: var(--card-bg);
            color: var(--text); border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .msg-info { font-size: 10px; opacity: 0.6; margin-bottom: 4px; display: block; }

        /* --- بوكس النص (ثابت تحت) --- */
        .input-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 15px 20px 30px 20px; /* زيادة مساحة للموبايلات الحديثة */
            background: linear-gradient(to top, var(--bg) 80%, transparent);
            display: flex; gap: 10px; align-items: center; z-index: 100;
        }

        .input-wrapper {
            flex: 1; position: relative; display: flex; align-items: center;
        }

        #userMsg {
            width: 100%; padding: 14px 20px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1); background: var(--card-bg);
            color: #fff; outline: none; font-family: 'Tajawal'; font-size: 1rem;
            transition: 0.3s;
        }
        #userMsg:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(108, 92, 231, 0.2); }

        .send-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--primary); color: #fff; border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
        }
        .send-btn:active { transform: scale(0.9); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="status-dot"></div>
            <h1>المصيبه شات</h1>
        </div>
        <p style="font-size: 10px; opacity: 0.5;">قصي الفلسطيني &copy;</p>
    </header>

    <div id="chat-box">
        <div class="message msg-other">
            <span class="msg-info">النظام</span>
            أهلاً بك في مساحة المصيبة.. عبّر عن رأيك بكل رقي ✨
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="userMsg" placeholder="اكتب رسالتك هنا..." autocomplete="off">
        </div>
        <button class="send-btn" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <script>
        // تعريف المستخدم (UUID عشوائي لكل جلسة)
        const myId = "user_" + Math.random().toString(16).slice(2);
        
        // إعداد PubNub (نفس القناة التفاعلية)
        const pubnub = new PubNub({
            publishKey: 'demo', 
            subscribeKey: 'demo',
            uuid: myId
        });

        pubnub.subscribe({ channels: ['mosiba_chat_v2'] });

        // استقبال الرسائل
        pubnub.addListener({
            message: function(s) {
                renderMessage(s.message.text, s.publisher);
            }
        });

        function sendMessage() {
            const input = document.getElementById('userMsg');
            const text = input.value.trim();

            if(!text) return;

            pubnub.publish({
                channel: 'mosiba_chat_v2',
                message: { text: text }
            });

            input.value = '';
            input.focus();
        }

        function renderMessage(text, senderId) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            
            // تحديد إذا كانت الرسالة لي أو لشخص آخر
            const isMe = (senderId === myId);
            msgDiv.className = `message ${isMe ? 'msg-me' : 'msg-other'}`;
            
            const senderName = isMe ? "أنا" : "مشارك";
            msgDiv.innerHTML = `<span class="msg-info">${senderName}</span>${text}`;
            
            chatBox.appendChild(msgDiv);
            
            // النزول لآخر رسالة تلقائياً
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // إرسال بالضغط على Enter
        document.getElementById('userMsg').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
