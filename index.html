<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>المصيبه | النسخة الاحترافية V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --bg: #0b0e14; --card-bg: #161b22; --primary: #6c5ce7; --gold: #f1c40f; --text: #e6edf3; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: #0b0e14; height: 100vh; color: var(--text); overflow: hidden; display: flex; flex-direction: column; }

        /* --- اللودر (Splash) --- */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000000; transition: opacity 0.8s ease; }
        .splash-logo { width: 180px; animation: pulseGlow 2.5s infinite ease-in-out; }
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(108, 92, 231, 0.2)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(108, 92, 231, 0.4)); } }

        /* --- المنيو --- */
        #main-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1c24 0%, #0b0e14 100%); display: none; flex-direction: column; justify-content: center; align-items: center; gap: 20px; z-index: 9999; }
        .menu-btn { width: 85%; max-width: 320px; padding: 18px; border-radius: 18px; background: var(--glass); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px); color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .menu-btn:active { transform: scale(0.95); }

        /* --- واجهة الشات --- */
        #chat-interface { display: none; flex-direction: column; height: 100vh; background: var(--bg); }
        header { padding: 15px 20px; background: rgba(22, 27, 34, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        header h1 { font-size: 1.1rem; font-weight: 900; color: var(--gold); }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 120px; scroll-behavior: smooth; }
        
        .message { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; animation: fadeIn 0.3s ease; position: relative; display: flex; flex-direction: column; word-wrap: break-word; }
        .msg-me { align-self: flex-start; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); }
        .msg-other { align-self: flex-end; background: var(--primary); color: #fff; }
        
        .message img, .message video { max-width: 100%; border-radius: 12px; margin-top: 5px; cursor: pointer; }
        
        .msg-info { font-size: 10px; opacity: 0.7; margin-bottom: 4px; font-weight: bold; }
        .admin-name { color: var(--gold) !important; font-weight: 900; }

        /* --- حقل الإدخال المحسن --- */
        .input-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px 15px 25px; background: var(--bg); display: flex; align-items: center; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); }
        #userMsg { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); background: var(--card-bg); color: #fff; outline: none; font-size: 0.95rem; }
        
        .icon-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--card-bg); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .send-btn { background: var(--primary); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="shaqi.png" class="splash-logo">
    </div>

    <div id="main-menu">
        <img src="shaqi.png" style="width: 140px; margin-bottom: 30px;">
        <button class="menu-btn" onclick="prepareChat()"><span>دخول المصيبة شات</span> <i class="fas fa-comments"></i></button>
        <button class="menu-btn" onclick="window.location.href='tiktok.html'"><span>تحميل تيك توك</span> <i class="fab fa-tiktok"></i></button>
    </div>

    <div id="chat-interface">
        <header>
            <button onclick="location.reload()" style="background:none; border:none; color:#fff;"><i class="fas fa-sign-out-alt"></i></button>
            <h1>المصيبه شات</h1>
            <div id="admin-actions" style="display: none;">
                <button onclick="clearChat()" style="color:var(--gold); background:none; border:none; font-size:12px;">مسح 🗑️</button>
            </div>
        </header>
        <div id="chat-box"></div>
        
        <div class="input-container">
            <button class="icon-btn" onclick="document.getElementById('fileInput').click()"><i class="fas fa-plus"></i></button>
            <button class="icon-btn" onclick="pickColor()"><i class="fas fa-palette"></i></button>
            <input type="file" id="fileInput" hidden accept="image/*,video/*" onchange="sendFile(this)">
            <input type="text" id="userMsg" placeholder="اكتب شيئاً..." autocomplete="off">
            <button class="icon-btn send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let myName = "", userColor = "#e6edf3", isAdmin = false;
        const myId = "u_" + Math.random().toString(16).slice(2);
        const pubnub = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', uuid: myId });

        function prepareChat() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'flex';
            login();
        }

        async function login() {
            const { value: name } = await Swal.fire({
                title: 'من أنت؟', input: 'text', confirmButtonText: 'دخول',
                background: '#161b22', color: '#fff', confirmButtonColor: '#6c5ce7', allowOutsideClick: false
            });
            
            if(name === "قصي") {
                const { value: pass } = await Swal.fire({ title: 'كلمة السر', input: 'password', background: '#161b22', color: '#fff' });
                if(pass === "159159") { isAdmin = true; myName = "قصي"; document.getElementById('admin-actions').style.display = 'block'; }
                else { location.reload(); }
            } else { myName = name || "مجهول"; }
            
            pubnub.subscribe({ channels: ['mosiba_v4_stream'] });
        }

        async function pickColor() {
            const { value: color } = await Swal.fire({
                title: 'اختر لون خطك',
                input: 'radio',
                inputOptions: { '#e6edf3': 'أبيض', '#f1c40f': 'ذهبي', '#2ecc71': 'أخضر', '#3498db': 'أزرق', '#e74c3c': 'أحمر' },
                background: '#161b22', color: '#fff'
            });
            if(color) userColor = color;
        }

        function sendMessage() {
            const input = document.getElementById('userMsg');
            if(!input.value.trim()) return;
            pubnub.publish({ channel: 'mosiba_v4_stream', message: { text: input.value, user: myName, color: userColor } });
            input.value = '';
        }

        function sendFile(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const type = file.type.startsWith('image') ? 'img' : 'vid';
                pubnub.publish({ channel: 'mosiba_v4_stream', message: { file: e.target.result, fileType: type, user: myName } });
            };
            reader.readAsDataURL(file);
        }

        pubnub.addListener({
            message: function(s) {
                const box = document.getElementById('chat-box');
                const div = document.createElement('div');
                const isMe = (s.publisher === myId);
                const isMsgAdmin = (s.message.user === "قصي");
                
                div.className = `message ${isMe ? 'msg-me' : 'msg-other'} ${isMsgAdmin ? 'msg-admin' : ''}`;
                let content = `<span class="msg-info ${isMsgAdmin ? 'admin-name' : ''}">${isMsgAdmin ? '👑 ' : ''}${s.message.user}</span>`;
                
                if(s.message.text) {
                    content += `<span style="color: ${s.message.color || '#fff'}">${s.message.text}</span>`;
                } else if(s.message.file) {
                    content += s.message.fileType === 'img' ? `<img src="${s.message.file}" onclick="window.open(this.src)">` : `<video controls src="${s.message.file}"></video>`;
                }
                
                div.innerHTML = content;
                box.appendChild(div);
                setTimeout(() => { box.scrollTop = box.scrollHeight; }, 100);
            }
        });

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => { 
                    document.getElementById('splash-screen').remove(); 
                    document.getElementById('main-menu').style.display = 'flex';
                }, 800);
            }, 2500);
        };
    </script>
</body>
</html>
