<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المصيبه | منصة الإهداءات الراقية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #0f0c29;
            --white: #ffffff;
            --gold: #f1c40f;
        }

        /* --- شاشة الترحيب --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1e1b40 0%, #0f0c29 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000000; transition: opacity 0.8s ease;
        }
        .splash-logo { width: 80%; max-width: 300px; animation: pulseGlow 2s infinite ease-in-out; }
        .splash-loader-bar { width: 60%; max-width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 20px; margin-top: 30px; overflow: hidden; }
        .splash-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #a29bfe, #6c5ce7); animation: splashLoad 3s forwards linear; }

        @keyframes pulseGlow { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.03); opacity: 1; } }
        @keyframes splashLoad { 0% { width: 0%; } 100% { width: 100%; } }

        /* --- شريط الإهداء العلوي --- */
        .live-ticker {
            position: fixed; top: 0; left: 0; width: 100%; height: 50px;
            background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; overflow: hidden; z-index: 99;
            backdrop-filter: blur(15px);
        }
        #tickerText {
            white-space: nowrap; font-size: 1.2rem; font-weight: 500; color: var(--gold);
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- الصفحة الرئيسية --- */
        body { font-family: 'Tajawal', sans-serif; background: #0f0c29; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; color: white; margin:0; }
        #portal-view { width: 100%; max-width: 450px; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .brand-img { width: 100px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4)); margin-bottom: 10px; }
        h1 { font-size: 35px; font-weight: 900; letter-spacing: 1px; color: #fff; margin-bottom: 5px; }

        /* كرت الإهداء */
        .dedication-card {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 30px; width: 100%; backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); animation: slideUp 1s ease-out;
        }
        .dedication-card p { font-size: 14px; opacity: 0.7; margin-bottom: 20px; text-align: center; }

        input, textarea {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 12px;
            text-align: center; font-family: 'Tajawal'; font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--secondary); background: rgba(255,255,255,0.08); }
        
        textarea { height: 90px; resize: none; }

        .send-btn {
            background: linear-gradient(135deg, #6c5ce7, #8e44ad); color: white; border: none; padding: 16px;
            border-radius: 12px; width: 100%; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s;
        }
        .send-btn:hover { opacity: 0.9; transform: translateY(-2px); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <img src="shaqi.png" alt="AL-MOSIBA" class="splash-logo">
            <div class="splash-loader-bar"><div class="splash-progress"></div></div>
            <p style="color:#fff; margin-top:15px; font-size: 14px; opacity: 0.8;">بانتظار لحظاتكم الجميلة...</p>
        </div>
    </div>

    <div class="live-ticker">
        <div id="tickerText">نسعد باستقبال كلماتكم الطيبة هنا.. 🕊️</div>
    </div>

    <div id="portal-view">
        <div class="main-logo">
            <img src="shaqi.png" alt="Logo" class="brand-img">
            <h1>المصيبه</h1>
            <p style="color:var(--gold); font-weight:500; font-size:11px; letter-spacing:3px; margin-bottom:25px; opacity: 0.9;">مساحة للإهداءات الراقية</p>
        </div>

        <div class="dedication-card">
            <p>تفضل بكتابة اسمك ورسالتك لتظهر للجميع</p>
            <input type="text" id="userName" placeholder="الاسم الكريم">
            <textarea id="userMsg" placeholder="عبر عن إهدائك بكلمات راقية..."></textarea>
            <button class="send-btn" onclick="sendDedication()">إرسال الإهداء الآن ✨</button>
        </div>
        
        <p style="text-align: center; margin-top: 30px; font-size: 11px; opacity: 0.4;">
            مع تحيات قصي الفلسطيني &copy; 2026
        </p>
    </div>

    <script>
        // إعداد الرادار
        const pubnub = new PubNub({
            publishKey: 'demo', 
            subscribeKey: 'demo',
            uuid: "visitor_" + Math.random().toString(16).slice(2)
        });

        pubnub.subscribe({ channels: ['mosiba_elegant_v1'] });

        pubnub.addListener({
            message: function(s) {
                const ticker = document.getElementById('tickerText');
                ticker.style.animation = 'none';
                ticker.innerText = `🕊️ إهداء من [ ${s.message.name} ]: ${s.message.msg} ✨`;
                setTimeout(() => { ticker.style.animation = 'marquee 20s linear infinite'; }, 50);
            }
        });

        function sendDedication() {
            const name = document.getElementById('userName').value.trim();
            const msg = document.getElementById('userMsg').value.trim();

            if(!name || !msg) return Swal.fire({ title: 'عذراً', text: 'يرجى إكمال البيانات بلطف', icon: 'info', confirmButtonText: 'حسناً' });

            pubnub.publish({
                channel: 'mosiba_elegant_v1',
                message: { name: name, msg: msg }
            });

            document.getElementById('userMsg').value = '';
            Swal.fire({ title: 'شكراً لك', text: 'تم نشر كلماتك بنجاح', icon: 'success', timer: 1500, showConfirmButton: false });
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                const s = document.getElementById('splash-screen');
                if(s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 800); }
            }, 3200);
        });
    </script>
</body>
</html>
