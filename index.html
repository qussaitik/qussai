<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>موقع المصيبه</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --bg: #0b0e14; --whatsapp-bg: #0b141a; --card-bg: #161b22; --primary: #00a884; --gold: #f1c40f; --text: #e6edf3; --msg-in: #202c33; --msg-out: #005c4b; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); height: 100vh; color: var(--text); overflow: hidden; display: flex; flex-direction: column; }

        /* --- اللودر --- */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999999; transition: opacity 0.8s ease; }
        .splash-logo { width: 85%; max-width: 400px; animation: pulseGlow 2.5s infinite ease-in-out; }
        .splash-loader-bar { width: 70%; max-width: 250px; height: 5px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; margin-top: 20px; }
        .splash-progress { width: 0%; height: 100%; background: linear-gradient(90deg, var(--gold), var(--primary)); animation: splashLoad 3s forwards linear; }
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(108, 92, 231, 0.2)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(108, 92, 231, 0.4)); } }
        @keyframes splashLoad { 0% { width: 0%; } 100% { width: 100%; } }

        /* --- المنيو --- */
        #main-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; justify-content: center; align-items: center; gap: 20px; z-index: 1000; }
        .menu-btn { width: 80%; max-width: 300px; padding: 18px; border-radius: 15px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }

        /* --- واجهة الشات --- */
        #chat-interface { display: none; flex-direction: column; height: 100vh; background-color: var(--whatsapp-bg); position: relative; z-index: 100; }
        header { padding: 10px 15px; background: #202c33; display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-title { font-size: 1.1rem; font-weight: 700; color: #e9edef; }
        .header-icons { display: flex; gap: 20px; color: #aebac1; font-size: 1.2rem; align-items: center; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px 10px; display: flex; flex-direction: column; gap: 5px; scroll-behavior: smooth; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; padding-bottom: 100px; }
        
        .message { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 0.95rem; position: relative; margin-bottom: 2px; line-height: 1.4; color: #e9edef; }
        .msg-me { align-self: flex-end; background: var(--msg-out); border-top-left-radius: 8px; }
        .msg-other { align-self: flex-start; background: var(--msg-in); border-top-right-radius: 8px; }
        
        .msg-admin { border-left: 3px solid var(--gold); }
        .admin-name { color: var(--gold) !important; font-weight: 900; font-size: 11px; display: block; margin-bottom: 2px; }
        .msg-info { font-size: 11px; color: #8696a0; display: block; margin-bottom: 2px; font-weight: bold; }
        .message img, .message video { max-width: 100%; border-radius: 8px; margin-top: 5px; }

        .input-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px; background: #202c33; display: flex; gap: 8px; z-index: 200; align-items: center; }
        #userMsg { flex: 1; padding: 12px 15px; border-radius: 25px; border: none; background: #2a3942; color: #fff; outline: none; font-family: 'Tajawal'; font-size: 1rem; }
        .btn-act { background: none; border: none; color: #8696a0; cursor: pointer; font-size: 1.3rem; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; background: #00a884; color: #fff; display: flex; align-items: center; justify-content: center; }
        
        /* ضبط SweetAlert ليكون فوق كل شيء */
        .swal2-container { z-index: 1000000 !important; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="shaqi.png" class="splash-logo">
        <div class="splash-loader-bar"><div class="splash-progress"></div></div>
    </div>

    <div id="main-menu">
        <img src="shaqi.png" style="width: 150px; margin-bottom: 20px;">
        <button class="menu-btn" onclick="checkAccess()"><i class="fas fa-comments"></i> دخول المصيبة شات</button>
        <button class="menu-btn" onclick="window.location.href='tiktok.html'"><i class="fab fa-tiktok"></i> تحميل تيك توك</button>
    </div>

    <div id="chat-interface">
        <header>
            <div class="header-left">
                <button onclick="location.reload()" style="background:none; border:none; color:#aebac1; margin-left: 10px;"><i class="fas fa-arrow-right"></i></button>
                <h1 class="header-title">المصيبه شات</h1>
            </div>
            <div class="header-icons">
                <i class="fas fa-video" onclick="Swal.fire({title:'مكالمة فيديو', text:'الميزة ستتوفر قريباً', icon:'info', background:'#161b22', color:'#fff'})"></i>
                <i class="fas fa-phone-alt" onclick="Swal.fire({title:'مكالمة صوتية', text:'الميزة ستتوفر قريباً', icon:'info', background:'#161b22', color:'#fff'})"></i>
                <div id="admin-actions" style="display: none;">
                    <i class="fas fa-trash-alt" onclick="clearChat()" style="color:var(--gold); margin-right: 15px;"></i>
                </div>
            </div>
        </header>
        <div id="chat-box"></div>
        <div class="input-container">
            <button class="btn-act" onclick="document.getElementById('fIn').click()"><i class="fas fa-paperclip"></i></button>
            <input type="file" id="fIn" hidden accept="image/*,video/*" onchange="upload(this)">
            <input type="text" id="userMsg" placeholder="اكتب رسالتك..." autocomplete="off">
            <button class="send-btn btn-act" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <audio id="msgSound" src="https://www.zapsplat.com/wp-content/uploads/2015/sound-effects-one/bell_small_ring_01.mp3"></audio>

    <script>
        let myName = "", isAdmin = false;
        const myId = "u_" + Math.random().toString(16).slice(2);
        const pubnub = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', uuid: myId });

        async function checkAccess() {
            // نخفي المنيو مؤقتاً عشان ما يغطي على التنبيه
            document.getElementById('main-menu').style.opacity = '0.5';
            
            const { value: accessPass } = await Swal.fire({
                title: 'رمز الدخول', input: 'password', inputPlaceholder: 'أدخل الرمز (789789)...',
                background: '#161b22', color: '#fff', confirmButtonColor: '#00a884', allowOutsideClick: false
            });

            if (accessPass === "789789") {
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('chat-interface').style.display = 'flex';
                login();
            } else {
                document.getElementById('main-menu').style.opacity = '1';
                if(accessPass) Swal.fire({ icon: 'error', title: 'خطأ', text: 'الرمز غير صحيح!', background: '#161b22', color: '#fff' });
            }
        }

        async function login() {
            const { value: name } = await Swal.fire({
                title: 'مرحباً بك', input: 'text', inputPlaceholder: 'اسمك...', confirmButtonText: 'دخول',
                background: '#161b22', color: '#fff', confirmButtonColor: '#00a884', allowOutsideClick: false
            });
            
            if (name === "قصي") {
                const { value: pass } = await Swal.fire({ title: 'كلمة سر الإدارة', input: 'password', background: '#161b22', color: '#fff' });
                if (pass === "159159") { 
                    isAdmin = true; myName = "قصي"; 
                    document.getElementById('admin-actions').style.display = 'block'; 
                } else { location.reload(); }
            } else { 
                myName = name || "مشارك"; 
            }
            pubnub.subscribe({ channels: ['mosiba_v8'] });
        }

        function upload(el) {
            const file = el.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                pubnub.publish({ channel: 'mosiba_v8', message: { media: e.target.result, mType: file.type.startsWith('image') ? 'img' : 'vid', user: myName } });
            };
            reader.readAsDataURL(file);
        }

        function sendMessage() {
            const input = document.getElementById('userMsg');
            if(!input.value.trim()) return;
            pubnub.publish({ channel: 'mosiba_v8', message: { text: input.value, user: myName } });
            input.value = '';
        }

        pubnub.addListener({
            message: function(s) {
                if(s.message.type === "clear") { document.getElementById('chat-box').innerHTML = ''; return; }
                render(s.message, s.publisher);
                if (s.publisher !== myId) {
                    document.getElementById('msgSound').play().catch(() => {});
                }
            }
        });

        function render(msg, sid) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            const isMe = (sid === myId);
            const isAdm = (msg.user === "قصي");
            div.className = `message ${isMe ? 'msg-me' : 'msg-other'} ${isAdm ? 'msg-admin' : ''}`;
            let h = isMe ? '' : (isAdm ? `<span class="admin-name">قصي 👑</span>` : `<span class="msg-info">${msg.user}</span>`);
            let b = msg.text ? `<span>${msg.text}</span>` : (msg.mType === 'img' ? `<img src="${msg.media}">` : `<video controls src="${msg.media}"></video>`);
            div.innerHTML = h + b;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function clearChat() { if(isAdmin) pubnub.publish({ channel: 'mosiba_v8', message: { type: "clear" } }); }

        window.onload = () => {
            setTimeout(() => {
                const s = document.getElementById('splash-screen');
                s.style.opacity = '0';
                setTimeout(() => { s.remove(); document.getElementById('main-menu').style.display = 'flex'; }, 800);
            }, 3000);
        };
        document.getElementById('userMsg').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
