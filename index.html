<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة عالم المصيبة | الماركت الأقوى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #0f0c29;
            --white: #ffffff;
            --gold: #f1c40f;
        }

        /* --- شاشة الترحيب --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #1e1b40, #16162a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000000;
            transition: opacity 1s ease;
            margin: 0; padding: 0;
        }
        .splash-content { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .splash-logo {
            width: 85%;
            max-width: 400px;
            height: auto;
            animation: fadeInGlow 1.5s ease-out forwards;
            filter: drop-shadow(0 0 15px rgba(108, 92, 231, 0.5));
        }
        .splash-loader-bar {
            width: 180px; height: 5px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .splash-progress {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #3498db, #9b59b6);
            animation: splashLoad 3.8s ease-in-out forwards;
        }
        .splash-loading-text {
            font-family: 'Tajawal', sans-serif;
            color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 500; margin-top: 15px;
        }
        @keyframes fadeInGlow {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes splashLoad {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            color: white;
        }

        .main-logo {
            text-align: center; margin-bottom: 40px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        .main-logo h1 {
            font-size: 45px; font-weight: 900;
            background: linear-gradient(to bottom, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(108, 92, 231, 0.5);
        }

        .portal-container {
            display: flex; flex-direction: column; gap: 15px;
            width: 100%; max-width: 400px;
            animation: slideUp 0.8s ease-out;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 25px;
            display: flex; align-items: center; gap: 20px;
            cursor: pointer; transition: 0.4s;
            backdrop-filter: blur(10px);
            text-decoration: none;
            color: white;
        }

        .portal-card:hover {
            background: rgba(108, 92, 231, 0.2);
            transform: scale(1.05);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .icon-box {
            width: 60px; height: 60px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white;
        }

        .tiktok-bg { background: linear-gradient(45deg, #6c5ce7, #a29bfe); }
        .youtube-bg { background: linear-gradient(45deg, #00b894, #55efc4); }
        .soon-bg { background: linear-gradient(45deg, #f1c40f, #f39c12); box-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }

        .card-text h3 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
        .card-text p { font-size: 12px; opacity: 0.7; }

        @keyframes glow { from { filter: drop-shadow(0 0 5px rgba(108,92,231,0.4)); } to { filter: drop-shadow(0 0 20px rgba(108,92,231,0.8)); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <img src="https://raw.githubusercontent.com/qussaitik/t/main/shaqi.png" alt="لوجو عالم المصيبة" class="splash-logo">
            <div class="splash-loader-bar">
                <div class="splash-progress"></div>
            </div>
            <p class="splash-loading-text">جاري تحضير عالم المصيبة...</p>
        </div>
    </div>

    <div id="portal-view">
        <div class="main-logo">
            <i class="fas fa-bolt" style="color: var(--gold); font-size: 40px; margin-bottom: 10px;"></i>
            <h1>لوحة المصيبه</h1>
            <p style="opacity: 0.6; font-size: 14px; letter-spacing: 2px;">🇵🇸QUSSAI PALESTINE🇵🇸</p>
        </div>

        <div class="portal-container">
            <a href="tiktok-service.html" class="portal-card">
                <div class="icon-box tiktok-bg"><i class="fab fa-tiktok"></i></div>
                <div class="card-text">
                    <h3>تنزيل فيديو من تيك توك</h3>
                    <p>تحميل الفيديوهات بدون علامة مائية</p>
                </div>
            </a>

            <a href="youtube-service.html" class="portal-card">
                <div class="icon-box youtube-bg"><i class="fab fa-youtube"></i></div>
                <div class="card-text">
                    <h3>تنزيل أغنية من يوتيوب</h3>
                    <p>تحويل مقاطع اليوتيوب إلى MP3 بجودة عالية</p>
                </div>
            </a>

            <div class="portal-card" style="cursor: default;">
                <div class="icon-box soon-bg"><i class="fas fa-clock"></i></div>
                <div class="card-text">
                    <h3>قريباً</h3>
                    <p>انتظروا خدماتنا الجديدة والمميزة</p>
                </div>
            </div>
        </div>
        
        <p style="text-align: center; margin-top: 30px; font-size: 11px; opacity: 0.4;">جميع الحقوق محفوظة لصالح قصي الفلسطيني 2026</p>
    </div>

    <script>
        // إخفاء شاشة الترحيب بعد 4 ثواني
        window.addEventListener('load', function() {
            setTimeout(function() {
                const splash = document.getElementById('splash-screen');
                if(splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => { splash.remove(); }, 1000);
                }
            }, 4000);
        });
    </script>
</body>
</html>
