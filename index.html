<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المصيبه | جدار الذكريات الحي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #f1c40f; --primary: #6c5ce7; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Tajawal', sans-serif; background: #0b0e14; 
            height: 100vh; overflow: hidden; color: white;
            display: flex; flex-direction: column;
        }

        /* جدار الملصقات */
        #wall {
            flex: 1; position: relative; width: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0b0e14 100%);
            overflow: hidden;
        }

        /* الملصق (الرسالة) */
        .note {
            position: absolute; padding: 12px 18px; border-radius: 15px;
            font-weight: 700; font-size: 0.9rem; color: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            white-space: nowrap; cursor: pointer;
            animation: float 6s infinite ease-in-out;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        /* واجهة الإدخال السفلية */
        .input-area {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            padding: 20px; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; gap: 10px; align-items: center; z-index: 100;
        }

        input {
            flex: 1; padding: 15px; border-radius: 12px; border: none;
            background: rgba(255,255,255,0.07); color: #fff; outline: none;
            font-family: 'Tajawal'; font-size: 1rem;
        }

        .send-btn {
            background: var(--primary); color: white; border: none;
            padding: 15px 25px; border-radius: 12px; font-weight: 900;
            cursor: pointer; transition: 0.3s;
        }

        .header {
            padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header h1 { font-size: 1.5rem; color: var(--gold); margin: 0; }
    </style>
</head>
<body>

    <div class="header">
        <h1>المصيبه | اترك بصمتك ✨</h1>
        <p style="font-size: 10px; opacity: 0.5;">الملصقات تظهر للجميع فوراً</p>
    </div>

    <div id="wall">
        </div>

    <div class="input-area">
        <input type="text" id="userMsg" placeholder="اكتب كلمة للذكرى..." maxlength="40">
        <button class="send-btn" onclick="sendNote()">إرسال 🚀</button>
    </div>

    <script>
        const colors = ['#6c5ce7', '#e84393', '#00cec9', '#fdcb6e', '#ff7675', '#a29bfe'];
        
        const pubnub = new PubNub({
            publishKey: 'demo', subscribeKey: 'demo',
            uuid: "visitor_" + Math.random().toString(16).slice(2)
        });

        pubnub.subscribe({ channels: ['mosiba_wall_v1'] });

        pubnub.addListener({
            message: function(s) {
                createNote(s.message.text, s.message.color);
            }
        });

        function sendNote() {
            const msg = document.getElementById('userMsg').value.trim();
            if(!msg) return;

            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            pubnub.publish({
                channel: 'mosiba_wall_v1',
                message: { text: msg, color: randomColor }
            });

            document.getElementById('userMsg').value = '';
        }

        function createNote(text, color) {
            const wall = document.getElementById('wall');
            const note = document.createElement('div');
            note.className = 'note';
            note.innerText = text;
            note.style.backgroundColor = color;
            
            // مواقع عشوائية
            const x = Math.random() * (wall.clientWidth - 150);
            const y = Math.random() * (wall.clientHeight - 60);
            
            note.style.left = x + 'px';
            note.style.top = y + 'px';

            wall.appendChild(note);

            // حذف الملصق بعد 30 ثانية عشان ما تنعجق الشاشة
            setTimeout(() => {
                note.style.opacity = '0';
                setTimeout(() => note.remove(), 1000);
            }, 30000);
        }
    </script>
</body>
</html>
