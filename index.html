<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>المصيبه | نسخة الإدارة الملكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --bg: #0b0e14; --card-bg: #161b22; --primary: #6c5ce7; --gold: #f1c40f; --text: #e6edf3; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); height: 100vh; color: var(--text); overflow: hidden; display: flex; flex-direction: column; }

        /* --- اللودر الأصلي الضخم --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000000; transition: opacity 0.8s ease; text-align: center;
        }
        .splash-logo { width: 85%; max-width: 400px; margin-bottom: 20px; animation: pulseGlow 2.5s infinite ease-in-out; }
        .splash-loader-bar { width: 70%; max-width: 250px; height: 5px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; }
        .splash-progress { width: 0%; height: 100%; background: linear-gradient(90deg, var(--gold), var(--primary)); animation: splashLoad 3s forwards linear; }
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(108, 92, 231, 0.2)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(108, 92, 231, 0.4)); } }
        @keyframes splashLoad { 0% { width: 0%; } 100% { width: 100%; } }

        /* --- المنيو الجديد --- */
        #main-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; justify-content: center; align-items: center; gap: 20px; z-index: 99999; }
        .menu-btn { width: 80%; max-width: 300px; padding: 18px; border-radius: 15px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; }
        .menu-btn:active { transform: scale(0.95); background: var(--primary); }

        /* --- واجهة الشات --- */
        #chat-interface { display: none; flex-direction: column; height: 100vh; }
        header { padding: 15px 20px; background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        header h1 { font-size: 1.2rem; font-weight: 900; color: var(--gold); }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; padding-bottom: 110px; }
        
        .message { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; animation: fadeIn 0.3s ease; position: relative; display: flex; flex-direction: column; word-wrap: break-word; }
        .msg-me { align-self: flex-start; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .msg-other { align-self: flex-end; background: var(--card-bg); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        
        .message img, .message video { max-width: 100%; border-radius: 12px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.1); }

        .msg-admin { border: 1px solid var(--gold); box-shadow: 0 0 15px rgba(241, 196, 15, 0.15); animation: adminPulse 2s infinite alternate; }
        @keyframes adminPulse { from { border-color: var(--gold); } to { border-color: #fff; } }

        .msg-info { font-size: 11px; opacity: 0.7; margin-bottom: 6px; font-weight: bold; }
        .admin-name { color: var(--gold); font-weight: 900; display: inline-flex; align-items: center; gap: 5px; position: relative; overflow: hidden; width: fit-content; }
        .admin-name::before { content: '👑'; font-size: 14px; }
        .admin-tools { font-size: 11px; margin-top: 8px; color: var(--gold); cursor: pointer; font-weight: 900; }

        /* بوكس النص الثابت والمطور */
        .input-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px 15px 25px; background: var(--bg); display: flex; gap: 8px; z-index: 100; align-items: center; }
        #userMsg { flex: 1; padding: 14px 18px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); background: var(--card-bg); color: #fff; outline: none; font-family: 'Tajawal'; font-size: 0.95rem; }
        
        .action-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: var(--card-bg); color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .send-btn { width: 48px; height: 48px; background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="shaqi.png" class="splash-logo">
        <div class="splash-loader-bar"><div class="splash-progress"></div></div>
        <p style="color:#fff; margin-top:18px; font-size: 13px; opacity: 0.6;">جاري دخول عالم المصيبة...</p>
    </div>

    <div id="main-menu">
        <img src="shaqi.png" style="width: 150px; margin-bottom: 20px;">
        <button class="menu-btn" onclick="startChat()"><i class="fas fa-comments"></i> دخول المصيبة شات</button>
        <button class="menu-btn" onclick="window.location.href='tiktok.html'"><i class="fab fa-tiktok"></i> تحميل فيديو تيك توك</button>
    </div>

    <div id="chat-interface">
        <header>
            <button onclick="location.reload()" style="background:none; border:none; color:#fff; font-size:1.3rem;"><i class="fas fa-sign-out-alt"></i></button>
            <h1>المصيبه شات</h1>
            <div id="admin-actions" style="display: none;">
                <button onclick="clearChat()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:4px 10px; border-radius:8px; font-size:10px; font-weight:bold;">مسح 🗑️</button>
            </div>
        </header>

        <div id="chat-box"></div>

        <div class="input-container">
            <button class="action-btn" onclick="document.getElementById('fileInput').click()"><i class="fas fa-plus-circle"></i></button>
            <button class="action-btn" onclick="pickColor()"><i class="fas fa-palette"></i></button>
            <input type="file" id="fileInput" hidden accept="image/*,video/*" onchange="sendMedia(this)">
            <input type="text" id="userMsg" placeholder="اكتب رسالتك..." autocomplete="off">
            <button class="send-btn action-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let myName = "", myColor = "#fff", isAdmin = false;
        const myId = "u_" + Math.random().toString(16).slice(2);
        const pubnub = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', uuid: myId });

        function startChat() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'flex';
            login();
        }

        async function login() {
            const { value: name } = await Swal.fire({
                title: 'هوية المستخدم', input: 'text', inputPlaceholder: 'اسمك الكريم...', confirmButtonText: 'دخول',
                background: '#161b22', color: '#fff', confirmButtonColor: '#6c5ce7', allowOutsideClick: false
            });
            if (name === "قصي") {
                const { value: pass } = await Swal.fire({ title: 'كلمة السر الإدارية', input: 'password', background: '#161b22', color: '#fff' });
                if (pass === "159159") { isAdmin = true; myName = "قصي"; document.getElementById('admin-actions').style.display = 'block'; }
                else { location.reload(); }
            } else { myName = name || "مشارك"; }
            pubnub.subscribe({ channels: ['mosiba_pro_v1'] });
        }

        async function pickColor() {
            const { value: color } = await Swal.fire({
                title: 'لون خطك', input: 'radio',
                inputOptions: { '#fff': 'أبيض', '#f1c40f': 'ذهبي', '#00ffcc': 'نيون', '#ff6b6b': 'أحمر' },
                background: '#161b22', color: '#fff'
            });
            if(color) myColor = color;
        }

        function sendMedia(el) {
            const file = el.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const type = file.type.startsWith('image') ? 'img' : 'vid';
                pubnub.publish({ channel: 'mosiba_pro_v1', message: { media: e.target.result, mType: type, user: myName } });
            };
            reader.readAsDataURL(file);
        }

        function sendMessage() {
            const input = document.getElementById('userMsg');
            if(!input.value.trim()) return;
            pubnub.publish({ channel: 'mosiba_pro_v1', message: { text: input.value, user: myName, color: myColor } });
            input.value = '';
        }

        pubnub.addListener({
            message: function(s) {
                if(s.message.type === "clear") { document.getElementById('chat-box').innerHTML = ''; return; }
                if(s.message.type === "kick" && s.message.targetId === myId) { location.reload(); return; }
                render(s.message, s.publisher);
            }
        });

        function render(msg, sid) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            const isMe = (sid === myId);
            const isAdminMsg = (msg.user === "قصي");
            
            div.className = `message ${isMe ? 'msg-me' : 'msg-other'} ${isAdminMsg ? 'msg-admin' : ''}`;
            let header = isAdminMsg ? `<span class="msg-info admin-name">قصي</span>` : `<span class="msg-info">${msg.user}</span>`;
            
            let content = "";
            if(msg.text) content = `<span style="color:${msg.color || '#fff'}">${msg.text}</span>`;
            else if(msg.media) content = msg.mType === 'img' ? `<img src="${msg.media}">` : `<video controls src="${msg.media}"></video>`;

            let tools = (isAdmin && !isMe) ? `<div class="admin-tools" onclick="kick('${sid}')">طرد 🚫</div>` : "";
            
            div.innerHTML = header + content + tools;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function clearChat() { if(isAdmin) pubnub.publish({ channel: 'mosiba_pro_v1', message: { type: "clear" } }); }
        function kick(id) { if(isAdmin) pubnub.publish({ channel: 'mosiba_pro_v1', message: { type: "kick", targetId: id } }); }

        window.onload = () => {
            setTimeout(() => {
                const s = document.getElementById('splash-screen');
                s.style.opacity = '0';
                setTimeout(() => { s.remove(); document.getElementById('main-menu').style.display = 'flex'; }, 800);
            }, 3000);
        };

        document.getElementById('userMsg').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
